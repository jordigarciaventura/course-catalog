<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 0 700 700" opacity="1">
    <defs>
        <linearGradient gradientTransform="rotate(26, 0.5, 0.5)" x1="50%" y1="0%" x2="50%" y2="100%"
